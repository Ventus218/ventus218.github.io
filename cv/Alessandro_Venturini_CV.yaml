cv:
  name: Alessandro Venturini
  headline:
  location: Bologna, Italy
  email: ales.ventus21@gmail.com
  photo: ../images/me3-squared.jpg
  phone: +39 3313534898
  # website: https://rendercv.com/
  social_networks:
    - network: LinkedIn
      username: Ventus218
    - network: GitHub
      username: Ventus218
  custom_connections:
  sections:
    about_me:
      - >
        I am deeply passionate about Computer Science, with a strong focus on
        its engineering aspects. I strive for technical excellence and aim to
        build software that has a meaningful impact on the world.


        I am curious and tenacious, and I value creating a positive work
        environment where I can enjoy what I do and build meaningful
        relationships with my colleagues.
    work_experience:
      - company: Oltre Solutions s.r.l.
        position: 150-hour Curricular Internship
        date: 2023
        start_date: 2023-03
        end_date: 2023-06
        location: Bologna, Italy
        highlights:
          - >
            I rewrote an Android application and ported it to iOS using
            Xamarin.Forms (currently in production on the [App
            Store](https://apps.apple.com/it/app/load-manager/id6448108872?platform=iphone))
    education:
      - institution: Alma Mater Studiorum - University of Bologna
        area: Computer Science and Engineering
        degree: MSc
        start_date: 2023-09
        end_date: 2026-03
        date: 2026-03
        location: Cesena, Italy
        summary:
        highlights:
          - "Final grade: 110/110 cum laude"
          - "Grade Point Average: 29.87/30"
          - "Thesis: **Effectful Aggregate Computation: towards a monadic view**
            (currently under embargo, but additional details can be shared upon
            request)"
      - institution: Alma Mater Studiorum - University of Bologna
        area: Computer Science and Engineering
        degree: BSc
        start_date: 2021-09
        end_date: 2023-06
        date: 2023-10
        location: Cesena, Italy
        summary:
        highlights:
          - >
            Thesis: **ANALISI DEL FRAMEWORK .NET MAUI PER LO SVILUPPO DI
            APPLICAZIONI MULTIPIATTAFORMA E REALIZZAZIONE DI UN’APPLICAZIONE
            COME CASO DI STUDIO** (available
            [here](https://amslaurea.unibo.it/id/eprint/29785/))
    projects:
      - label: "[DomoticASW](https://github.com/DomoticASW)"
        details: >
          A smart home management system featuring a web app, real-time device
          monitoring, a visual scripting system for automation, access control,
          and a custom protocol for smart devices.
      - label: "[ScalaGameEngine](https://github.com/Ventus218/ScalaGameEngine)"
        details: >
          An extensible game engine for Scala exploiting mixins for behavior
          composition, featuring basic 2D rendering, basic physics and collision
          handling, a testing DSL, and 3 sample games.
      - label: "[TOC-it](https://ventus218.github.io/TOC-it)"
        details: >
          Web utility to generate the table of contents of a Markdown document.
          (About 300 users last year)
      - label: Others
        details: >
          All my other projects are listed on my [GitHub
          profile](https://github.com/Ventus218)
    technical_skills:
      - label: Languages
        details:
          Scala, Swift, Java, C#, C, Typescript, SQL, POSIX, HTML, CSS, Python,
          Javascript, PHP, Gleam, Lua, Prolog
      - label: Frameworks
        details:
          SwiftUI, UIKit (iOS), Vapor, Xamarin.Forms, Flutter, .NET MAUI, Akka,
          Vue, Express, Unity
      - label: Infrastructure
        details: Kubernetes, Docker, Kafka, Terraform
    personal_skills:
      - label: Languages
        details: Italian (Native), English (B2)
      - label: Soft-skills
        details: Teamwork, Leadership, Proactivity

